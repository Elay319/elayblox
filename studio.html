<!DOCTYPE html>
<html>
<head>
  <title>ElayBlox Studio 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🧱 ElayBlox Studio 3D</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="play.html">Games</a>
    <a href="studio.html">Studio</a>
  </nav>
</header>

<main>
  <main class="studio-layout">

  <div class="sidebar">

    <input id="gameName" placeholder="Game name">

    <textarea id="gameDesc"
      placeholder="Game description"></textarea>

    <button onclick="addBlock()">➕ Add Block</button>

    <hr>

    <button onclick="moveBlock(-1,0,0)">⬅ Move X</button>
    <button onclick="moveBlock(1,0,0)">➡ Move X</button>

    <button onclick="moveBlock(0,1,0)">⬆ Move Y</button>
    <button onclick="moveBlock(0,-1,0)">⬇ Move Y</button>

    <button onclick="moveBlock(0,0,-1)">Forward Z</button>
    <button onclick="moveBlock(0,0,1)">Back Z</button>

    <hr>

    <button onclick="resizeBlock(1,0,0)">Width +</button>
    <button onclick="resizeBlock(-1,0,0)">Width -</button>

    <button onclick="resizeBlock(0,1,0)">Height +</button>
    <button onclick="resizeBlock(0,-1,0)">Height -</button>

    <button onclick="resizeBlock(0,0,1)">Depth +</button>
    <button onclick="resizeBlock(0,0,-1)">Depth -</button>

    <hr>

    <select id="scriptType" onchange="setScript()">
      <option value="normal">Normal</option>
      <option value="bounce">Bounce</option>
      <option value="win">Win</option>
      <option value="damage">Damage</option>
    </select>

    <button onclick="deleteBlock()">🗑 Delete</button>

    <button onclick="publishGame()">🚀 Publish</button>

    <p id="msg">Click a block to select it.</p>

  </div>

  <div class="viewport">
    <div id="viewport"></div>
  </div>

</main>
</main>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const API = "https://elayblox-server.onrender.com";

let scene, camera, renderer, raycaster, mouse;
let blocks = [];
let selected = null;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / 500, 0.1, 1000);
  camera.position.set(8, 8, 12);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth - 50, 500);
  document.getElementById("viewport").appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 10, 5);
  scene.add(light);

  const ambient = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambient);

  const grid = new THREE.GridHelper(50, 50);
  scene.add(grid);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  renderer.domElement.addEventListener("click", selectBlock);
}

function addBlock() {
  const data = {
    type: "block",
    x: 0,
    y: 0.5,
    z: 0,
    w: 4,
    h: 1,
    d: 4,
    color: "green",
    script: "normal"
  };

  const mesh = createMesh(data);
  data.mesh = mesh;
  blocks.push(data);
  scene.add(mesh);
  selected = data;
  updateSelection();
}

function createMesh(data) {
  const geo = new THREE.BoxGeometry(data.w, data.h, data.d);
  const mat = new THREE.MeshStandardMaterial({ color: data.color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(data.x, data.y, data.z);
  mesh.userData.block = data;
  return mesh;
}

function selectBlock(event) {
  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const objects = blocks.map(b => b.mesh);
  const hits = raycaster.intersectObjects(objects);

  if (hits.length > 0) {
    selected = hits[0].object.userData.block;
    updateSelection();
  }
}

function updateSelection() {
  blocks.forEach(b => {
    b.mesh.material.emissive = new THREE.Color(0x000000);
  });

  if (selected) {
    selected.mesh.material.emissive = new THREE.Color(0x333333);
    document.getElementById("scriptType").value = selected.script;
    document.getElementById("msg").textContent =
      "Selected block | Script: " + selected.script;
  }
}

function moveBlock(dx, dy, dz) {
  if (!selected) return;

  selected.x += dx;
  selected.y += dy;
  selected.z += dz;

  selected.mesh.position.set(selected.x, selected.y, selected.z);
}

function resizeBlock(dw, dh, dd) {
  if (!selected) return;

  selected.w = Math.max(1, selected.w + dw);
  selected.h = Math.max(1, selected.h + dh);
  selected.d = Math.max(1, selected.d + dd);

  scene.remove(selected.mesh);
  selected.mesh = createMesh(selected);
  scene.add(selected.mesh);
  updateSelection();
}

function setScript() {
  if (!selected) return;

  selected.script = document.getElementById("scriptType").value;

  if (selected.script === "normal") selected.color = "green";
  if (selected.script === "bounce") selected.color = "blue";
  if (selected.script === "win") selected.color = "gold";
  if (selected.script === "damage") selected.color = "red";

  scene.remove(selected.mesh);
  selected.mesh = createMesh(selected);
  scene.add(selected.mesh);
  updateSelection();
}

function deleteBlock() {
  if (!selected) return;

  scene.remove(selected.mesh);
  blocks = blocks.filter(b => b !== selected);
  selected = null;
  document.getElementById("msg").textContent = "Deleted block.";
}

async function publishGame() {
  const saveBlocks = blocks.map(b => ({
    type: b.type,
    x: b.x,
    y: b.y,
    z: b.z,
    w: b.w,
    h: b.h,
    d: b.d,
    color: b.color,
    script: b.script
  }));

  const game = {
    name: document.getElementById("gameName").value,
    description: document.getElementById("gameDesc").value,
    blocks: saveBlocks
  };

  const res = await fetch(API + "/publish-block-game", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(game)
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("msg").innerHTML =
      `Published! <a href="${data.playUrl}" target="_blank">Play game</a>`;
  } else {
    document.getElementById("msg").textContent = data.error || "Error";
  }
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>
</body>
</html>
