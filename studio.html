<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ElayBlox Studio 3D</title>

<style>
body{margin:0;font-family:Arial;background:#111827;color:white}
header{background:#1f2937;text-align:center;padding:20px}
nav a{color:white;text-decoration:none;background:#374151;padding:8px 14px;border-radius:8px;margin:0 5px}
.studio-layout{display:flex;height:calc(100vh - 110px)}
.sidebar{width:330px;background:#1f2937;padding:15px;overflow-y:auto}
.sidebar input,.sidebar textarea,.sidebar button,.sidebar select{
  width:100%;box-sizing:border-box;margin-bottom:10px;padding:10px;border:none;border-radius:8px
}
.sidebar button{background:#22c55e;cursor:pointer;font-weight:bold}
.viewport{flex:1;background:#0f172a}
#viewport{width:100%;height:100%}
hr{border:1px solid #374151}
#explorer{background:#111827;padding:8px;border-radius:8px;font-size:14px;min-height:80px}
</style>
</head>

<body>
<header>
  <h1>🧱 ElayBlox Studio 3D</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="play.html">Games</a>
    <a href="studio.html">Studio</a>
    <a href="profile.html">Profile</a>
    <a href="login.html" id="loginLink">Login</a>
  </nav>
</header>

<main class="studio-layout">
  <div class="sidebar">
    <input id="gameName" placeholder="Game name">
    <textarea id="gameDesc" placeholder="Game description"></textarea>

    <button onclick="addBlock()">➕ Add Block</button>
    <button onclick="addObject('button')">🔘 Add Button</button>
    <button onclick="addObject('seat')">💺 Add Seat</button>
    <button onclick="addObject('spawn')">⭐ Add Spawn</button>
    <button onclick="addScriptToSelected()">📄 Add JSBlock Script</button>

    <hr>

    <h3>Explorer</h3>
    <div id="explorer"></div>

    <hr>

    <button onclick="moveBlock(-1,0,0)">⬅ Move X</button>
    <button onclick="moveBlock(1,0,0)">➡ Move X</button>
    <button onclick="moveBlock(0,1,0)">⬆ Move Y</button>
    <button onclick="moveBlock(0,-1,0)">⬇ Move Y</button>
    <button onclick="moveBlock(0,0,-1)">Forward Z</button>
    <button onclick="moveBlock(0,0,1)">Back Z</button>

    <hr>

    <button onclick="resizeBlock(1,0,0)">Width +</button>
    <button onclick="resizeBlock(-1,0,0)">Width -</button>
    <button onclick="resizeBlock(0,1,0)">Height +</button>
    <button onclick="resizeBlock(0,-1,0)">Height -</button>
    <button onclick="resizeBlock(0,0,1)">Depth +</button>
    <button onclick="resizeBlock(0,0,-1)">Depth -</button>

    <hr>

    <select id="scriptType" onchange="setScript()">
      <option value="normal">🟩 Normal Block</option>
      <option value="bounce">🟦 Bounce Block</option>
      <option value="win">🟨 Win Block</option>
      <option value="damage">🟥 Damage Block</option>
      <option value="speed">🟪 Speed Block</option>
      <option value="teleport">🟧 Teleport Block</option>
      <option value="checkpoint">🟫 Checkpoint Block</option>
      <option value="coin">🪙 Coin Block</option>
      <option value="kill">☠️ Kill Block</option>
      <option value="spawn">⭐ Spawn Block</option>
    </select>

    <button onclick="deleteBlock()">🗑 Delete Selected</button>
    <button onclick="publishGame()">🚀 Publish Game</button>
    <button onclick="clearStudioSave()">🧹 Clear Local Save</button>

    <p id="msg">Click an object to select it.</p>
  </div>

  <div class="viewport">
    <div id="viewport"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const API = "https://elayblox-server.onrender.com";

let scene, camera, renderer, raycaster, mouse;
let blocks = [];
let selected = null;

init();
animate();
loadStudioLocal();
updateExplorer();

document.getElementById("gameName").addEventListener("input", saveStudioLocal);
document.getElementById("gameDesc").addEventListener("input", saveStudioLocal);

const navUser = JSON.parse(localStorage.getItem("elaybloxUser") || "null");
const loginLink = document.getElementById("loginLink");
if (navUser && loginLink) {
  loginLink.textContent = navUser.username;
  loginLink.href = "profile.html";
}

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  const viewport = document.getElementById("viewport");

  camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
  camera.position.set(10,10,10);
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({antialias:true});
  viewport.appendChild(renderer.domElement);

  resizePreview();
  window.addEventListener("resize", resizePreview);

  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(10,20,10);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xffffff,0.5));

  const grid = new THREE.GridHelper(100,100);
  scene.add(grid);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  renderer.domElement.addEventListener("click", selectBlock);
}

function resizePreview(){
  const viewport = document.getElementById("viewport");
  const width = viewport.clientWidth || 900;
  const height = viewport.clientHeight || 500;

  renderer.setSize(width, height);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
}

function createMesh(data){
  let geo;

  if (data.type === "seat") {
    geo = new THREE.BoxGeometry(data.w, 0.6, data.d);
  } else if (data.type === "button") {
    geo = new THREE.BoxGeometry(data.w, 0.3, data.d);
  } else {
    geo = new THREE.BoxGeometry(data.w, data.h, data.d);
  }

  const mat = new THREE.MeshStandardMaterial({color:data.color});
  const mesh = new THREE.Mesh(geo,mat);

  mesh.position.set(data.x,data.y,data.z);
  mesh.userData.block = data;

  return mesh;
}

function addBlock(){
  addObject("block");
}

function addObject(type){
  const colors = {
    block:"green",
    button:"orange",
    seat:"blue",
    spawn:"white"
  };

  const obj = {
    id:"obj_" + Date.now() + "_" + Math.floor(Math.random() * 9999),
    type:type,
    name:type.charAt(0).toUpperCase() + type.slice(1),
    x:0,
    y:0.5,
    z:0,
    w:type === "button" ? 2 : 4,
    h:type === "button" ? 0.3 : 1,
    d:type === "button" ? 2 : 4,
    color:colors[type] || "green",
    script:type === "spawn" ? "spawn" : "normal",
    scripts:[],
    tpTarget:null
  };

  obj.mesh = createMesh(obj);
  blocks.push(obj);
  scene.add(obj.mesh);

  selected = obj;
  updateSelection();
  updateExplorer();
  saveStudioLocal();
}

function selectBlock(event){
  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse,camera);

  const hits = raycaster.intersectObjects(blocks.map(b=>b.mesh));

  if(hits.length){
    selected = hits[0].object.userData.block;
    updateSelection();
    updateExplorer();
  }
}

function updateSelection(){
  blocks.forEach(b=>{
    b.mesh.material.emissive = new THREE.Color(0x000000);
  });

  if(selected){
    selected.mesh.material.emissive = new THREE.Color(0x333333);
    document.getElementById("scriptType").value = selected.script || "normal";
    document.getElementById("msg").textContent =
      "Selected " + (selected.name || "Object") + " | " + (selected.script || "normal");
  }
}

function updateExplorer(){
  const explorer = document.getElementById("explorer");
  explorer.innerHTML = "";

  if (blocks.length === 0) {
    explorer.innerHTML = "<p>No objects yet.</p>";
    return;
  }

  blocks.forEach(b => {
    const div = document.createElement("div");
    div.style.padding = "5px";
    div.style.cursor = "pointer";
    div.style.borderRadius = "6px";
    div.style.marginBottom = "4px";
    div.style.background = selected === b ? "#374151" : "transparent";
    div.textContent = "📦 " + (b.name || "Object") + " (" + (b.type || "block") + ")";

    div.onclick = () => {
      selected = b;
      updateSelection();
      updateExplorer();
    };

    explorer.appendChild(div);

    if (Array.isArray(b.scripts)) {
      b.scripts.forEach(script => {
        const s = document.createElement("div");
        s.style.padding = "4px 4px 4px 22px";
        s.style.cursor = "pointer";
        s.textContent = "📄 " + script.name;

        s.onclick = () => {
          selected = b;
          updateSelection();
          document.getElementById("msg").textContent =
            "Selected script: " + script.name + " on " + b.name;
        };

        explorer.appendChild(s);
      });
    }
  });
}

function addScriptToSelected(){
  if(!selected) {
    document.getElementById("msg").textContent = "Select an object first.";
    return;
  }

  if(!Array.isArray(selected.scripts)) {
    selected.scripts = [];
  }

  selected.scripts.push({
    id:"script_" + Date.now(),
    name:"JSBlock Script",
    code:"event.touch {\\n  message(Hello from JSBlocks)\\n}"
  });

  document.getElementById("msg").textContent =
    "Added JSBlock Script to " + selected.name;

  updateExplorer();
  saveStudioLocal();
}

function moveBlock(dx,dy,dz){
  if(!selected) return;

  selected.x += dx;
  selected.y += dy;
  selected.z += dz;

  selected.mesh.position.set(selected.x,selected.y,selected.z);
  saveStudioLocal();
  updateExplorer();
}

function resizeBlock(dw,dh,dd){
  if(!selected) return;

  selected.w = Math.max(1,selected.w + dw);
  selected.h = Math.max(0.2,selected.h + dh);
  selected.d = Math.max(1,selected.d + dd);

  scene.remove(selected.mesh);
  selected.mesh = createMesh(selected);
  scene.add(selected.mesh);

  updateSelection();
  updateExplorer();
  saveStudioLocal();
}

function setScript(){
  if(!selected) return;

  selected.script = document.getElementById("scriptType").value;

  if(selected.script === "normal") selected.color = "green";
  if(selected.script === "bounce") selected.color = "blue";
  if(selected.script === "win") selected.color = "yellow";
  if(selected.script === "damage") selected.color = "red";
  if(selected.script === "speed") selected.color = "purple";
  if(selected.script === "teleport") selected.color = "orange";
  if(selected.script === "checkpoint") selected.color = "brown";
  if(selected.script === "coin") selected.color = "gold";
  if(selected.script === "kill") selected.color = "black";
  if(selected.script === "spawn") selected.color = "white";

  scene.remove(selected.mesh);
  selected.mesh = createMesh(selected);
  scene.add(selected.mesh);

  updateSelection();
  updateExplorer();
  saveStudioLocal();
}

function deleteBlock(){
  if(!selected) return;

  scene.remove(selected.mesh);
  blocks = blocks.filter(b => b !== selected);
  selected = null;

  document.getElementById("msg").textContent = "Deleted object.";
  updateExplorer();
  saveStudioLocal();
}

function makeSaveBlocks(){
  return blocks.map(b => ({
    id:b.id,
    type:b.type || "block",
    name:b.name || "Block",
    x:b.x,
    y:b.y,
    z:b.z,
    w:b.w,
    h:b.h,
    d:b.d,
    color:b.color,
    script:b.script,
    scripts:b.scripts || [],
    tpTarget:b.tpTarget || null
  }));
}

async function publishGame(){
  const saveBlocks = makeSaveBlocks();
  const user = JSON.parse(localStorage.getItem("elaybloxUser") || "null");

  const game = {
    name:document.getElementById("gameName").value,
    description:document.getElementById("gameDesc").value,
    creator:user ? user.username : "Unknown",
    creatorId:user ? user.id : null,
    blocks:saveBlocks
  };

  const res = await fetch(API + "/publish-block-game", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(game)
  });

  const data = await res.json();

  if(data.success){
    document.getElementById("msg").innerHTML =
      `Published! <a style="color:white" href="${data.playUrl}" target="_blank">Play</a>`;
  } else {
    document.getElementById("msg").textContent = data.error || "Error";
  }
}

function saveStudioLocal() {
  localStorage.setItem("elaybloxStudioSave", JSON.stringify({
    name: document.getElementById("gameName").value,
    description: document.getElementById("gameDesc").value,
    blocks: makeSaveBlocks()
  }));
}

function loadStudioLocal() {
  const saved = localStorage.getItem("elaybloxStudioSave");
  if (!saved) return;

  const data = JSON.parse(saved);

  document.getElementById("gameName").value = data.name || "";
  document.getElementById("gameDesc").value = data.description || "";

  if (Array.isArray(data.blocks)) {
    data.blocks.forEach(block => {
      block.id = block.id || ("obj_" + Date.now() + "_" + Math.floor(Math.random() * 9999));
      block.type = block.type || "block";
      block.name = block.name || "Block";
      block.scripts = block.scripts || [];
      block.mesh = createMesh(block);
      blocks.push(block);
      scene.add(block.mesh);
    });
  }
}

function clearStudioSave() {
  localStorage.removeItem("elaybloxStudioSave");
  location.reload();
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
</script>
</body>
</html>
