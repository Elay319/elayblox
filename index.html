<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ElayBlox</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div id="accountBar"></div>

<header>
  <h1>🎮 ElayBlox</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="play.html">Games</a>
    <a href="studio.html">Studio</a>
    <a href="login.html">Login</a>
    <a href="profile.html">Profile</a>
    <a href="friends.html">Friends</a>
    <a href="messages.html">Messages</a>
    <a href="party.html">Party</a>
  </nav>
</header>

<main>

  <section class="hero">
    <h2>Make and play 3D block games</h2>

    <p>
      Create games with blocks,
      resize them,
      add bounce blocks,
      win blocks,
      damage blocks,
      and more.
    </p>

    <a class="play-btn" href="studio.html">
      🚀 Open Studio
    </a>
  </section>

  <hr>

  <h2>Newest Games</h2>

  <div id="games" class="games-grid">
    Loading games...
  </div>

</main>

<script>
const user =
JSON.parse(
localStorage.getItem(
"elaybloxUser"
));

const accountBar =
document.getElementById(
"accountBar"
);

if(user){

  accountBar.innerHTML = `
    Logged in as
    <b>${user.username}</b>

    <button onclick="logout()">
      Logout
    </button>
  `;

}else{

  accountBar.innerHTML = `
    <a href="login.html">
      Login
    </a>
  `;
}

function logout(){

  localStorage.removeItem(
    "elaybloxUser"
  );

  location.reload();
}
</script>

<script src="games.js"></script>

</body>
</html>
