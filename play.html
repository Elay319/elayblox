<!DOCTYPE html>
<html>
<head>
  <title>ElayBlox Games</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<script>
const user = JSON.parse(localStorage.getItem("elaybloxUser") || "null");
const loginLink = document.getElementById("loginLink");

if (user && loginLink) {
  loginLink.textContent = user.username;
  loginLink.href = "profile.html";
}
</script>
<body>
  <header>
    <h1>🎮 Games</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="play.html">Games</a>
      <a href="studio.html" id="loginLink">studio</a>
      <a href="login.html" id="loginLink">Login</a>
      <a href="friends.html">Friends</a>
    </nav>
  </header>

  <main>
    <div id="games" class="games-grid"></div>
  </main>

  <script src="games.js"></script>
</body>
</html>
