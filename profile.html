<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Profile - ElayBlox</title>
<link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>
  <h1>👤 My Profile</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="play.html">Games</a>
    <a href="studio.html">Studio</a>
    <a href="profile.html">Profile</a>
    <a href="login.html">Login</a>
    <a href="friends.html">Friends</a>
    <a href="messages.html">Messages</a>
  </nav>
</header>

<main>
  <div class="form-box">
    <h2 id="username">Loading...</h2>

    <img
      id="avatarPreview"
      src=""
      width="128"
      height="128"
      style="display:block;margin:auto;border-radius:12px;object-fit:cover;background:#374151;"
    >

    <br>

    <input
      type="file"
      id="avatarUpload"
      accept="image/png,image/jpeg,image/webp"
    >

    <button onclick="uploadAvatar()">Upload Avatar</button>

    <p id="userId"></p>
    <p id="msg"></p>

    <button onclick="logout()">Logout</button>
  </div>
</main>

<script>
const API = "https://elayblox-server.onrender.com";

let user = JSON.parse(localStorage.getItem("elaybloxUser"));

if (!user) {
  location.href = "login.html";
}

document.getElementById("username").textContent = user.username;
document.getElementById("userId").textContent = "User ID: " + user.id;

const avatarPreview = document.getElementById("avatarPreview");

if (user.avatar) {
  avatarPreview.src = user.avatar;
}

async function uploadAvatar() {
  const fileInput = document.getElementById("avatarUpload");
  const file = fileInput.files[0];

  if (!file) {
    document.getElementById("msg").textContent = "Choose an image first.";
    return;
  }

  const formData = new FormData();
  formData.append("avatar", file);
  formData.append("userId", user.id);

  document.getElementById("msg").textContent = "Uploading...";

  const res = await fetch(API + "/upload-avatar", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (data.success) {
    user.avatar = data.avatar;

    localStorage.setItem(
      "elaybloxUser",
      JSON.stringify(user)
    );

    avatarPreview.src = data.avatar;
    document.getElementById("msg").textContent = "Avatar uploaded!";
  } else {
    document.getElementById("msg").textContent =
      data.error || "Upload failed";
  }
}

function logout() {
  localStorage.removeItem("elaybloxUser");
  location.href = "login.html";
}
</script>

</body>
</html>
