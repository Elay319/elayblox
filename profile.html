<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Profile - ElayBlox</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>👤 My Profile</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="play.html">Games</a>
    <a href="studio.html">Studio</a>
    <a href="profile.html">Profile</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<main>

  <div class="form-box">

    <h2 id="username">Loading...</h2>

    <img
      id="avatarPreview"
      src=""
      width="128"
      height="128"
      style="
      display:block;
      margin:auto;
      border-radius:12px;
      object-fit:cover;
      background:#374151;
      "
    >

    <br>

    <input
      type="file"
      id="avatarUpload"
      accept="image/png,image/jpeg,image/webp"
    >

    <p id="userId"></p>

    <button onclick="logout()">
      Logout
    </button>

  </div>

</main>

<script>

const user =
JSON.parse(
localStorage.getItem(
"elaybloxUser"
));

if(!user){
  location.href =
  "login.html";
}

document.getElementById(
"username"
).textContent =
user.username;

document.getElementById(
"userId"
).textContent =
"User ID: " +
user.id;

const avatarPreview =
document.getElementById(
"avatarPreview"
);

const savedAvatar =
localStorage.getItem(
"elaybloxAvatar"
);

if(savedAvatar){
  avatarPreview.src =
  savedAvatar;
}

document
.getElementById(
"avatarUpload"
)
.addEventListener(
"change",
e => {

  const file =
  e.target.files[0];

  if(!file) return;

  const reader =
  new FileReader();

  reader.onload =
  () => {

    localStorage.setItem(
      "elaybloxAvatar",
      reader.result
    );

    avatarPreview.src =
    reader.result;
  };

  reader.readAsDataURL(
    file
  );

});

function logout(){

  localStorage.removeItem(
    "elaybloxUser"
  );

  location.href =
  "login.html";
}

</script>

</body>
</html>
